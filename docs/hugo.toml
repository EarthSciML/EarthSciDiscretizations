baseURL = "https://earthsciml.github.io/EarthSciDiscretizations/"
languageCode = "en-us"
title = "EarthSciDiscretizations — Discretization Catalog"
# No theme — layouts are provided directly under layouts/.

# Use docs/ as the site root when building from this repo.
# CI invokes `hugo --source docs --minify --destination public`.

enableGitInfo = true
enableRobotsTXT = true

[params]
  description = "Browsable catalog of discretization rules and grid families used by ESD."
  repoURL = "https://github.com/EarthSciML/EarthSciDiscretizations"

# Taxonomies drive faceted navigation. Each key is the singular frontmatter
# field name; the value is the plural used in the URL
# (/families/finite_difference/, /grid_families/cartesian/, ...).
[taxonomies]
  family = "families"
  grid_family = "grid_families"
  rule_kind = "rule_kinds"
  tag = "tags"

[markup]
  [markup.goldmark.renderer]
    # Allow raw HTML in generated markdown (<details>, <img>, <figure>).
    unsafe = true
  # Pass math delimiters through untouched so Goldmark does not mangle LaTeX
  # (underscores as emphasis, `\_` -> `_`, etc.). KaTeX auto-render then picks
  # up the raw `$$...$$` / `\(...\)` delimiters in the final HTML.
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [["\\[", "\\]"], ["$$", "$$"]]
      inline = [["\\(", "\\)"]]
  [markup.highlight]
    style = "github"
    lineNos = false
    codeFences = true

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

# Don't try to syntax-check Hugo's "page bundles" — every page lives in
# its own directory as `index.md` so it can carry sibling plot artifacts.
[permalinks]
  grids = "/grids/:slug/"
  rules = "/rules/:slug/"
