name: "TypeScript"

on:
  pull_request:
    branches:
      - main
      - 'release-'
    paths:
      - 'typescript/**'
      - 'tests/conformance/**'
      - '.github/workflows/TypeScript.yml'
  push:
    branches:
      - main
    paths:
      - 'typescript/**'
      - 'tests/conformance/**'
      - '.github/workflows/TypeScript.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-test:
    name: "Node ${{ matrix.node-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: EarthSciDiscretizations/typescript
    steps:
      - name: "Checkout EarthSciDiscretizations"
        uses: actions/checkout@v6
        with:
          path: EarthSciDiscretizations

      - name: "Checkout EarthSciSerialization (sibling)"
        uses: actions/checkout@v6
        with:
          repository: EarthSciML/EarthSciSerialization
          path: EarthSciSerialization

      - name: "Set up Node ${{ matrix.node-version }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "EarthSciDiscretizations/typescript/package-lock.json"

      - name: "Build EarthSciSerialization earthsci-toolkit"
        working-directory: EarthSciSerialization/packages/earthsci-toolkit
        run: |
          npm install
          npm run build

      - name: "Install"
        run: npm install --no-package-lock

      - name: "Typecheck"
        run: npm run typecheck

      - name: "Build"
        run: npm run build

      - name: "Test"
        run: npm test
