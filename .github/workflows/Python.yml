name: "Python"

on:
  pull_request:
    branches:
      - main
      - 'release-'
    paths:
      - 'python/**'
      - 'tests/conformance/**'
      - '.github/workflows/Python.yml'
  push:
    branches:
      - main
    paths:
      - 'python/**'
      - 'tests/conformance/**'
      - '.github/workflows/Python.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    working-directory: python

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: "Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "python/pyproject.toml"

      - name: "Install"
        # Note: pyproject.toml declares the unpublished `earthsci-toolkit` (ESS)
        # via a `git+https://...#subdirectory=...` reference, so pip fetches and
        # builds it transparently — no explicit ESS checkout step required.
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: "Lint"
        run: ruff check src tests

      - name: "Test"
        run: pytest --cov=earthsci_discretizations --cov-report=term-missing
